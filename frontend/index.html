<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilo.css">
    <title>Sistema para analizar dados em PHP</title>
</head>

<body>
    <div class="area_mouse"></div>

    <aside class="conexoes">
        <label for="" id="banco_conectado"></label>
        <label for="" id="arquivo_adicionado"></label>
    </aside>

    <header class="cabecalho">
        <a href="">PROMPT</a>
        <a href="">Conexões e arquivos</a>
        <a href="">Conversões</a>
    </header>

    <div class="importar-arquivos">
        <div class="inputs-arquivos">
            <span>Banco de dados:</span>
            <label class="arquivos" for="banco">Banco de dados</label>
            <input type="file" id="banco" accept=".sql">
            <span>Planilhas Excel:</span>
            <label class="arquivos" for="arquivosExcel">Arquivos excel</label>
            <input type="file" id="arquivosExcel" multiple accept=".csv,.xlsx">

            <div class="botoes">
                <button id="importar">Importar</button>
            </div>
        </div>

    </div>


</body>

</html>
<script src="js/script.js"></script>
